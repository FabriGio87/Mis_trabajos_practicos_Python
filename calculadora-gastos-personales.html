<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de gastos personales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500;1,9..144,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #FAF6EF;
    --paper-shadowed: #EFE9DC;
    --ink: #20242B;
    --ink-soft: #74726A;
    --rule: #D8D2C4;
    --green: #2F6F4F;
    --red: #B23A2F;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--paper-shadowed);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(32,36,43,0.04) 1px, transparent 1px);
    background-size: 14px 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 40px 16px;
    font-family:'IBM Plex Mono', monospace;
    color: var(--ink);
  }

  .receipt{
    position:relative;
    width:100%;
    max-width: 420px;
    background: var(--paper);
    padding: 8px 32px 32px;
    box-shadow: 0 18px 40px -12px rgba(32,36,43,0.35);
  }

  .torn{
    position:absolute;
    top:-9px; left:0; right:0; height:18px;
    background: var(--paper);
    clip-path: polygon(
      0% 100%, 4% 30%, 8% 100%, 12% 30%, 16% 100%, 20% 30%, 24% 100%,
      28% 30%, 32% 100%, 36% 30%, 40% 100%, 44% 30%, 48% 100%, 52% 30%,
      56% 100%, 60% 30%, 64% 100%, 68% 30%, 72% 100%, 76% 30%, 80% 100%,
      84% 30%, 88% 100%, 92% 30%, 96% 100%, 100% 30%, 100% 100%
    );
  }

  header{
    text-align:center;
    padding: 30px 0 18px;
    border-bottom: 1px dashed var(--rule);
  }

  h1{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 1.5rem;
    margin: 0 0 4px;
    line-height: 1.25;
  }

  header p{
    margin:0;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  form{
    display:flex;
    flex-direction:column;
    gap: 12px;
    padding: 22px 0 18px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap: 4px;
  }

  label{
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  input{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.95rem;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--rule);
    padding: 6px 2px;
    outline: none;
    transition: border-color .15s ease;
  }

  input:focus{
    border-bottom-color: var(--ink);
  }

  button{
    margin-top: 8px;
    font-family:'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--ink);
    border: none;
    padding: 12px;
    cursor: pointer;
    transition: transform .08s ease, background .15s ease;
  }

  button:hover{ background: var(--green); }
  button:active{ transform: scale(0.98); }

  .lines{
    list-style:none;
    margin:0;
    padding: 6px 0 0;
    display:flex;
    flex-direction:column;
    gap: 10px;
    max-height: 260px;
    overflow-y:auto;
  }

  .lines:empty + .empty-state{ display:block; }

  .empty-state{
    display:none;
    font-style: italic;
    font-family:'Fraunces', serif;
    color: var(--ink-soft);
    font-size: 0.85rem;
    text-align:center;
    padding: 10px 0 4px;
  }

  .line{
    display:flex;
    align-items:baseline;
    gap: 6px;
    font-size: 0.85rem;
  }

  .line .name{
    white-space: nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .line .dots{
    flex:1;
    border-bottom: 1px dotted var(--rule);
    transform: translateY(-4px);
  }

  .line .amount{
    font-weight: 500;
    white-space: nowrap;
  }

  .line .del{
    border:none;
    background:none;
    color: var(--red);
    font-size: 0.85rem;
    cursor:pointer;
    padding: 0 0 0 4px;
    line-height:1;
  }

  .line .del:hover{ opacity: 0.6; }

  .total-row{
    margin-top: 18px;
    padding-top: 14px;
    border-top: 3px double var(--ink);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }

  .total-row .label{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-size: 1rem;
  }

  .total-row .value{
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--green);
  }

  footer{
    text-align:center;
    padding-top: 18px;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
</style>
</head>
<body>

  <div class="receipt">
    <div class="torn"></div>

    <header>
      <h1>Calculadora de gastos personales</h1>
      <p>Registro de gastos diarios</p>
    </header>

    <form id="expense-form">
      <div class="field">
        <label for="name">Nombre del gasto</label>
        <input type="text" id="name" placeholder="Ej: Supermercado" autocomplete="off" required>
      </div>
      <div class="field">
        <label for="amount">Monto</label>
        <input type="number" id="amount" placeholder="Ej: 5000" min="0" step="0.01" autocomplete="off" required>
      </div>
      <button type="submit">Agregar gasto</button>
    </form>

    <ul class="lines" id="lines"></ul>
    <p class="empty-state" id="empty-state">Aún no registraste gastos. Agregá el primero arriba.</p>

    <div class="total-row">
      <span class="label">Total acumulado</span>
      <span class="value" id="total">$0,00</span>
    </div>

    <footer>Calculadora de gastos personales</footer>
  </div>

<script>
  const form = document.getElementById('expense-form');
  const nameInput = document.getElementById('name');
  const amountInput = document.getElementById('amount');
  const linesEl = document.getElementById('lines');
  const emptyState = document.getElementById('empty-state');
  const totalEl = document.getElementById('total');

  let expenses = [];

  function formatMoney(value){
    return value.toLocaleString('es-AR', { style: 'currency', currency: 'ARS' });
  }

  function render(){
    linesEl.innerHTML = '';
    expenses.forEach((exp, index) => {
      const li = document.createElement('li');
      li.className = 'line';
      li.innerHTML = `
        <span class="name">${exp.name}</span>
        <span class="dots"></span>
        <span class="amount">${formatMoney(exp.amount)}</span>
        <button type="button" class="del" title="Eliminar" aria-label="Eliminar gasto">×</button>
      `;
      li.querySelector('.del').addEventListener('click', () => {
        expenses.splice(index, 1);
        render();
      });
      linesEl.appendChild(li);
    });

    emptyState.style.display = expenses.length === 0 ? 'block' : 'none';

    const total = expenses.reduce((sum, e) => sum + e.amount, 0);
    totalEl.textContent = formatMoney(total);
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = nameInput.value.trim();
    const amount = parseFloat(amountInput.value);

    if(!name || isNaN(amount) || amount < 0) return;

    expenses.push({ name, amount });
    nameInput.value = '';
    amountInput.value = '';
    nameInput.focus();
    render();
  });

  render();
</script>

</body>
</html>
